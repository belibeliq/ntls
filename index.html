<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Navigation -->
    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">My Service Business</h1>
        <a href="#book" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Book Now</a>
    </nav>

    <!-- Hero Section -->
    <header class="py-20 text-center">
        <h2 class="text-4xl font-extrabold text-gray-900 mb-4">Professional Services, Simplified.</h2>
        <p class="text-gray-600 text-lg mb-8">Ready to get started? Schedule your appointment below.</p>
    </header>

    <!-- Appointment Section -->
    <section id="book" class="max-w-4xl mx-auto p-6 bg-white rounded-2xl shadow-xl mb-20">
        <div class="text-center mb-8">
            <h3 class="text-2xl font-bold">Select a Time</h3>
            <p class="text-gray-500">Fill out the form below to secure your spot.</p>
        </div>

        
        <div class="aspect-video w-full">
            <iframe 
                src="https://tally.so/r/gDZdEO" 
                width="100%" 
                height="500" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0" 
                title="Appointment Booking">
            </iframe>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-sm">
        © 2026 NTLS Business.
    </footer>

</body>
</html>
